{% extends "base.html" %}

{% block title %}Change Admin Password - Phishing Detection Platform{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-5 col-md-7">
        <div class="panel auth-card">
            <div class="text-center mb-4">
                <div class="feature-icon mx-auto">
                    <i class="bi bi-key"></i>
                </div>
                <div class="section-label justify-content-center">
                    <i class="bi bi-shield-lock"></i>
                    Administrator Security
                </div>
                <h1 class="h2 mb-2">Change Password</h1>
                <p class="text-light-emphasis mb-0">
                    Update the password for the currently logged-in admin account.
                </p>
            </div>

            <form method="POST" action="{{ url_for('admin_change_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="current_password" class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Enter current password" required>
                </div>
                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required>
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-info w-100 mb-3">
                    <i class="bi bi-check2-circle me-2"></i>Update Password
                </button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light w-100">
                    <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
