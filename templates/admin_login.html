{% extends "base.html" %}

{% block title %}Admin Login - Phishing Detection Platform{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-5 col-md-7">
        <div class="panel auth-card">
            <div class="text-center mb-4">
                <div class="feature-icon mx-auto">
                    <i class="bi bi-person-lock"></i>
                </div>
                <div class="section-label justify-content-center">
                    <i class="bi bi-shield-lock"></i>
                    Secure Administrator Access
                </div>
                <h1 class="h2 mb-2">Admin Login</h1>
                <p class="text-light-emphasis mb-0">
                    Sign in to review scan history, platform statistics, and activity logs.
                </p>
            </div>

            <form method="POST" action="{{ url_for('admin_login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter administrator username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter administrator password" required>
                </div>
                <button type="submit" class="btn btn-info w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login to Dashboard
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
