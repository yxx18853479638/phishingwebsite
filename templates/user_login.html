{% extends "base.html" %}

{% block title %}User Login - Phishing Detection Platform{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-5 col-md-7">
        <div class="panel auth-card">
            <div class="text-center mb-4">
                <div class="feature-icon mx-auto">
                    <i class="bi bi-person-circle"></i>
                </div>
                <div class="section-label justify-content-center">
                    <i class="bi bi-shield-check"></i>
                    Secure User Access
                </div>
                <h1 class="h2 mb-2">User Login</h1>
                <p class="text-light-emphasis mb-0">
                    Sign in to save your phishing scans and review your own scan history.
                </p>
            </div>

            <form method="POST" action="{{ url_for('user_login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-info w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

            <p class="text-light-emphasis text-center mt-4 mb-0">
                No account yet? <a href="{{ url_for('user_register') }}" class="link-primary">Create one here</a>.
            </p>
        </div>
    </div>
</div>
{% endblock %}
