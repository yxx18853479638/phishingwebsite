{% extends "base.html" %}

{% block title %}Register - Phishing Detection Platform{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-5 col-md-7">
        <div class="panel auth-card">
            <div class="text-center mb-4">
                <div class="feature-icon mx-auto">
                    <i class="bi bi-person-plus"></i>
                </div>
                <div class="section-label justify-content-center">
                    <i class="bi bi-shield-plus"></i>
                    Create Your Account
                </div>
                <h1 class="h2 mb-2">User Registration</h1>
                <p class="text-light-emphasis mb-0">
                    Create an account to save your phishing scans and review them later.
                </p>
            </div>

            <form method="POST" action="{{ url_for('user_register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-info w-100">
                    <i class="bi bi-person-check me-2"></i>Create Account
                </button>
            </form>

            <p class="text-light-emphasis text-center mt-4 mb-0">
                Already have an account? <a href="{{ url_for('user_login') }}" class="link-primary">Sign in here</a>.
            </p>
        </div>
    </div>
</div>
{% endblock %}
